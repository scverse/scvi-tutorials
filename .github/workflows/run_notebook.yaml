name: run notebook

on:
  workflow_call:
    inputs:
      notebook:
        description: "Path to the notebook to run"
        required: true
        type: string
      version:
        description: "latest/stable/semver/branch"
        required: true
        type: string

jobs:
  notebook:
    runs-on: [self-hosted, Linux, X64, CUDA]

    container:
      image: ghcr.io/scverse/scvi-tools:py3.13-cu12-${{ inputs.version }}-tutorials
      options: --user root --gpus all

    timeout-minutes: 600 # lenient timeout for scbasset tutorial

    steps:
      - uses: actions/checkout@v4

      - name: Install Python kernel
        run: |
          python -m ipykernel install
          python -m pip install "scvi-tools[tutorials,cuda13]" cuml-cu13 cugraph-cu13 cupy-cuda13x
          NVCC=$(find /usr/local/lib -path "*/nvidia/cuda_nvcc/bin/nvcc" 2>/dev/null | head -1)
          [ -n "$NVCC" ] && export PATH="$(dirname "$NVCC"):$PATH"
          python -m pip install rapids-singlecell
          
      - name: Run notebook
        run: |
          python -m jupyter nbconvert --execute --inplace ${{ inputs.notebook }}

      - uses: peter-evans/create-pull-request@v5
        with:
          commit-message: run ${{ inputs.notebook }}
          title: automated update for ${{ inputs.notebook }}
          branch: update-${{ inputs.notebook }}
